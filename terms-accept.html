<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terms & Conditions — Be Unavoidable</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f0ea;
      --surface: #ece6de;
      --card: #ffffff;
      --border: rgba(26,26,26,0.10);
      --text: #1a1a1a;
      --text-dim: #6b6560;
      --text-light: #958e85;
      --blue: #1e4f8a;
      --warm: #b5714a;
      --red: #a93e33;
      --green: #5a9a5a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      width: 100%;
      max-width: 440px;
    }
    .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
      color: var(--text);
    }
    .logo-sub {
      font-family: 'Source Serif 4', serif;
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 4px;
      font-style: italic;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    }
    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 1px;
      color: var(--text);
      margin-bottom: 8px;
    }
    .card-sub {
      font-family: 'Source Serif 4', serif;
      font-size: 14px;
      color: var(--text-dim);
      font-style: italic;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .tc-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .tc-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      flex-shrink: 0;
      accent-color: var(--blue);
      cursor: pointer;
    }
    .tc-label {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
    }
    .tc-label a {
      color: var(--blue);
      text-decoration: underline;
      font-weight: 500;
    }
    .tc-label a:hover { color: #1a4478; }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
      letter-spacing: 0.3px;
    }
    .btn-primary:hover:not(:disabled) { background: #1a4478; }
    .btn-primary:active:not(:disabled) { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--red);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 18px;
      display: none;
    }
    .error-msg.show { display: block; }
    .footer {
      border-top: 1px solid var(--border);
      padding: 48px 24px 32px;
      text-align: center;
      background: var(--bg);
      margin-top: 40px;
      width: 100%;
    }
    .footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 12px; color: var(--text); }
    .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
    .footer-links a { font-size: 0.8rem; color: var(--text-dim); text-decoration: none; transition: color 0.2s; font-weight: 500; }
    .footer-links a:hover { color: var(--blue); }
    .footer-copy { font-size: 0.7rem; color: var(--text-light); letter-spacing: 0.3px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-text">BE UNAVOIDABLE</div>
      <div class="logo-sub">Your career clarity platform</div>
    </div>

    <div class="card">
      <div class="card-title">One Last Step</div>
      <p class="card-sub">Before continuing to enrollment, please review and accept our terms.</p>

      <div id="error-box" class="error-msg"></div>

      <div class="tc-row">
        <input type="checkbox" id="tc-checkbox" />
        <label class="tc-label" for="tc-checkbox">
          By continuing, you agree to our
          <a href="/terms.html" target="_blank">Terms &amp; Conditions</a>
          and
          <a href="/privacy.html" target="_blank">Privacy Policy</a>.
        </label>
      </div>

      <button class="btn-primary" id="btn-continue" disabled onclick="handleContinue()">
        Continue to Enrollment
      </button>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-logo">BE UNAVOIDABLE</div>
    <div class="footer-links">
      <a href="/privacy.html">Privacy Policy</a>
      <a href="/terms.html">Terms &amp; Conditions</a>
    </div>
    <div class="footer-copy">© 2026 Be Unavoidable, LLC · All rights reserved.</div>
  </footer>

  <script>
    var _userId = null;
    var _email = null;

    (async function() {
      try {
        var res = await fetch('/api/verify', { credentials: 'include' });
        if (!res.ok) throw new Error('not authenticated');
        var data = await res.json();
        if (!data.authenticated) throw new Error('not authenticated');
        if (data.paid) {
          window.location.href = '/dashboard.html';
          return;
        }
        _userId = data.userId;
        _email = data.email;
      } catch (e) {
        window.location.href = '/login.html';
      }
    })();

    document.getElementById('tc-checkbox').addEventListener('change', function() {
      document.getElementById('btn-continue').disabled = !this.checked;
    });

    async function handleContinue() {
      var btn = document.getElementById('btn-continue');
      var errBox = document.getElementById('error-box');
      btn.disabled = true;
      btn.textContent = 'Please wait\u2026';
      errBox.classList.remove('show');

      try {
        var acceptRes = await fetch('/api/accept-terms', {
          method: 'POST',
          credentials: 'include',
        });
        var acceptData = await acceptRes.json();
        if (!acceptRes.ok || !acceptData.ok) throw new Error(acceptData.error || 'Could not record acceptance');

        var checkoutRes = await fetch('/api/stripe-checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ userId: _userId, email: _email }),
        });
        var checkoutData = await checkoutRes.json();
        if (!checkoutRes.ok || !checkoutData.url) throw new Error(checkoutData.error || 'Could not start checkout');

        window.location.href = checkoutData.url;
      } catch (err) {
        errBox.textContent = err.message;
        errBox.classList.add('show');
        document.getElementById('tc-checkbox').checked = false;
        btn.disabled = false;
        btn.textContent = 'Continue to Enrollment';
      }
    }
  </script>
</body>
</html>
