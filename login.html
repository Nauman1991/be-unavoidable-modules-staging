<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Be Unavoidable</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f0ea;
      --surface: #ece6de;
      --card: #ffffff;
      --border: rgba(26,26,26,0.10);
      --text: #1a1a1a;
      --text-dim: #6b6560;
      --text-light: #958e85;
      --blue: #1e4f8a;
      --warm: #b5714a;
      --red: #a93e33;
      --green: #5a9a5a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      width: 100%;
      max-width: 440px;
    }
    .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
      color: var(--text);
    }
    .logo-sub {
      font-family: 'Source Serif 4', serif;
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 4px;
      font-style: italic;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    }
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 32px;
      border-bottom: 2px solid var(--surface);
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--blue); background: #fff; }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    .btn-primary:hover { background: #1a4478; }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--text-light);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .btn-google {
      width: 100%;
      padding: 12px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
      color: var(--text);
      text-decoration: none;
    }
    .btn-google:hover { border-color: #4285f4; background: #f8f9ff; }
    .google-icon {
      width: 20px;
      height: 20px;
    }
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--red);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 18px;
      display: none;
    }
    .error-msg.show { display: block; }
    .success-msg {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: var(--green);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 18px;
      display: none;
    }
    .success-msg.show { display: block; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* FOOTER */
    .footer{border-top:1px solid var(--border);padding:48px 24px 32px;text-align:center;background:var(--bg);margin-top:40px;width:100%;}
    .footer-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;margin-bottom:12px;color:var(--text);}
    .footer-links{display:flex;justify-content:center;gap:20px;margin-bottom:16px;flex-wrap:wrap;}
    .footer-links a{font-size:0.8rem;color:var(--text-dim);text-decoration:none;transition:color 0.2s;font-weight:500;}
    .footer-links a:hover{color:var(--blue);}
    .footer-copy{font-size:0.7rem;color:var(--text-light);letter-spacing:0.3px;}
    .footer-pdf-link{display:inline-flex;align-items:center;gap:4px;font-size:0.7rem;color:var(--text-light);text-decoration:none;}
    .footer-pdf-link:hover{color:var(--blue);}
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-text">BE UNAVOIDABLE</div>
      <div class="logo-sub">Your career clarity platform</div>
    </div>

    <div class="card">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Sign In</div>
        <div class="tab" onclick="switchTab('register')">Create Account</div>
      </div>

      <div id="error-box" class="error-msg"></div>
      <div id="success-box" class="success-msg"></div>

      <!-- LOGIN -->
      <div class="panel active" id="panel-login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn-primary" id="btn-login" onclick="handleLogin()">Sign In</button>

        <div class="divider">or</div>
        <a class="btn-google" href="/api/google">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </a>
      </div>

      <!-- REGISTER -->
      <div class="panel" id="panel-register">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Your name" autocomplete="name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min 8 characters" autocomplete="new-password" />
        </div>
        <button class="btn-primary" id="btn-register" onclick="handleRegister()">Create Account</button>

        <div class="divider">or</div>
        <a class="btn-google" href="/api/google">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </a>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-logo">BE UNAVOIDABLE</div>
    <div class="footer-links">
      <a href="/privacy.html">Privacy Policy</a>
      <a href="/terms.html">Terms & Conditions</a>
      <a href="/documents/BeUnavoidable_Terms_and_Conditions 3-25-26 (1).pdf" class="footer-pdf-link" target="_blank">Terms PDF</a>
      <a href="/documents/BeUnavoidable_Privacy_Policy 3-25-26 (1).pdf" class="footer-pdf-link" target="_blank">Privacy PDF</a>
    </div>
    <div class="footer-copy">© 2026 Be Unavoidable, LLC · All rights reserved.</div>
  </footer>

  <script>
    // Check for error params in URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
      const msgs = {
        google_denied: 'Google sign-in was cancelled.',
        google_token: 'Could not complete Google sign-in. Please try again.',
        google_user: 'Could not retrieve your Google account info.',
        server: 'A server error occurred. Please try again.',
      };
      showError(msgs[params.get('error')] || 'An error occurred.');
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`.tab:${tab === 'login' ? 'first-child' : 'last-child'}`).classList.add('active');
      document.getElementById(`panel-${tab}`).classList.add('active');
      hideMessages();
    }

    function showError(msg) {
      const el = document.getElementById('error-box');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('success-box').classList.remove('show');
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-box');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('error-box').classList.remove('show');
    }

    function hideMessages() {
      document.getElementById('error-box').classList.remove('show');
      document.getElementById('success-box').classList.remove('show');
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showError('Please enter your email and password.');

      const btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      hideMessages();

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        window.location.href = '/terms-accept.html';
      } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    async function handleRegister() {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      if (!name || !email || !password) return showError('Please fill in all fields.');
      if (password.length < 8) return showError('Password must be at least 8 characters.');

      const btn = document.getElementById('btn-register');
      btn.disabled = true;
      btn.textContent = 'Creating account…';
      hideMessages();

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');
        window.location.href = '/terms-accept.html';
      } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    // Allow Enter key
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const loginActive = document.getElementById('panel-login').classList.contains('active');
      if (loginActive) handleLogin();
      else handleRegister();
    });
  </script>
</body>
</html>
